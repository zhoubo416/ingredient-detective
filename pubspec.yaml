name: ingredient_detective
description: "配料侦探 - AI智能分析食品成分安全与营养价值。"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  camera: ^0.11.3
  http: ^1.1.0
  crypto: ^3.0.3
  convert: ^3.1.1
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  sqflite: ^2.3.0
  path: ^1.8.3
  fluttertoast: ^8.2.4
  loading_animation_widget: ^1.2.0+4
  permission_handler: ^11.0.1
  device_info_plus: ^10.1.0
  flutter_dotenv: ^5.1.0
  supabase_flutter: ^2.10.3
  purchases_flutter: ^9.10.0
  purchases_ui_flutter: ^9.10.0
  flutter_html: ^3.0.0-beta.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/.env
